<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK 比赛主控调试台</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <h1>RK 比赛主控调试台</h1>
            <span class="badge" id="badge-mode">待机</span>
        </div>
        <div class="topbar-right">
            <span id="clock">--</span>
        </div>
    </header>

    <main class="main-grid">
        <section class="panel panel-left">
            <div class="card-group">
                <div class="card device-card" id="card-script">
                    <div class="card-icon">S</div>
                    <div class="card-body">
                        <div class="card-title">Script 主控</div>
                        <div class="card-sub" id="script-listen">--</div>
                    </div>
                    <div class="card-status" id="status-script">○</div>
                </div>
                <div class="card device-card" id="card-vision">
                    <div class="card-icon">V</div>
                    <div class="card-body">
                        <div class="card-title">Vision Studio</div>
                        <div class="card-sub">VS 连接 Script 主控端口</div>
                    </div>
                    <div class="card-status" id="status-vision">○</div>
                </div>
                <div class="card device-card" id="card-camera">
                    <div class="card-icon">3D</div>
                    <div class="card-body">
                        <div class="card-title">RK 3D TCP</div>
                        <div class="card-sub" id="three-d-target">--</div>
                    </div>
                    <div class="card-status" id="status-camera">○</div>
                </div>
                <div class="card device-card" id="card-arm">
                    <div class="card-icon">B</div>
                    <div class="card-body">
                        <div class="card-title">Dobot Bot</div>
                        <div class="card-sub" id="bot-target">--</div>
                    </div>
                    <div class="card-status" id="status-arm">○</div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-start" id="btn-start" onclick="sendControl('start')">启动监听</button>
                <button class="btn btn-stop" id="btn-stop" onclick="sendControl('stop')" disabled>停止</button>
                <button class="btn btn-pause" id="btn-pause" onclick="sendControl('pause')" disabled>暂停</button>
                <button class="btn btn-resume" id="btn-resume" onclick="sendControl('resume')" disabled>恢复</button>
            </div>

            <div class="settings-panel script-editor-panel">
                <div class="set-title">
                    <span>比赛剧本</span>
                    <span id="script-path">--</span>
                </div>
                <textarea id="script-editor" spellcheck="false"></textarea>
                <div class="set-actions">
                    <button class="btn btn-home" onclick="loadScript()">重新读取</button>
                    <button class="btn btn-start" onclick="saveScript()">保存剧本</button>
                    <span id="script-msg"></span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-num" id="stat-total">0</div>
                    <div class="stat-label">总任务</div>
                </div>
                <div class="stat stat-ok">
                    <div class="stat-num" id="stat-ok">0</div>
                    <div class="stat-label">成功</div>
                </div>
                <div class="stat stat-fail">
                    <div class="stat-num" id="stat-fail">0</div>
                    <div class="stat-label">失败</div>
                </div>
            </div>
        </section>

        <section class="panel panel-right">
            <section class="script-watch">
                <div class="watch-head">
                    <div>
                        <div class="watch-title">剧本观察</div>
                        <div class="watch-sub" id="watch-current">当前步骤：待机</div>
                    </div>
                    <div class="watch-last">
                        <div>RX <span id="watch-rx">--</span></div>
                        <div>TX <span id="watch-tx">--</span></div>
                    </div>
                </div>
                <div class="event-list" id="event-list">
                    <div class="event-row is-empty">等待 VS 指令...</div>
                </div>
            </section>

            <section class="debug-tabs">
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="traffic" onclick="setDebugTab('traffic')">通信</button>
                    <button class="tab-btn" data-tab="logs" onclick="setDebugTab('logs')">日志</button>
                    <span class="traffic-actions">
                        <button class="btn-clear" onclick="clearTraffic()">清空</button>
                        <label class="traffic-filter"><input type="checkbox" id="traffic-tx" checked onchange="filterTraffic()">TX</label>
                        <label class="traffic-filter"><input type="checkbox" id="traffic-rx" checked onchange="filterTraffic()">RX</label>
                        <span class="traffic-count" id="traffic-count">0</span>
                    </span>
                </div>

                <div class="tab-panel active" id="tab-traffic">
                    <div class="traffic-tabs" role="tablist" aria-label="通信设备">
                        <button class="traffic-tab active" type="button" data-device="all" onclick="setTrafficDevice('all')" role="tab" aria-selected="true">
                            全部 <span id="traffic-tab-count-all">0</span>
                        </button>
                        <button class="traffic-tab" type="button" data-device="script" onclick="setTrafficDevice('script')" role="tab" aria-selected="false">
                            Script <span id="traffic-tab-count-script">0</span>
                        </button>
                        <button class="traffic-tab" type="button" data-device="vision" onclick="setTrafficDevice('vision')" role="tab" aria-selected="false">
                            VS <span id="traffic-tab-count-vision">0</span>
                        </button>
                        <button class="traffic-tab" type="button" data-device="camera3d" onclick="setTrafficDevice('camera3d')" role="tab" aria-selected="false">
                            3D <span id="traffic-tab-count-camera3d">0</span>
                        </button>
                        <button class="traffic-tab" type="button" data-device="arm" onclick="setTrafficDevice('arm')" role="tab" aria-selected="false">
                            Bot <span id="traffic-tab-count-arm">0</span>
                        </button>
                    </div>
                    <div class="traffic-container" id="traffic-container">
                        <div class="traffic-line traffic-placeholder">等待通信数据...</div>
                    </div>
                </div>

                <div class="tab-panel" id="tab-logs">
                    <div class="log-container" id="log-container">
                        <div class="log-line log-info">等待启动...</div>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
