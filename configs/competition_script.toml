# RK doCtl Script
#
# 这是比赛主控的唯一 Script 配置文件。
# - doCtl 主控始终作为 TCP Client 主动连接 Vision Studio、RK 3D、Dobot Bot。
# - 比赛自动流程的 IP、端口、超时、坐标、Z、目标点、字段顺序，都以本文件为准。
# - config.py 只保留 Web 服务端口和旧调试命令的默认值；Script 自动流程不要再改 config.py。
# - 所有协议字符串最终都是分号格式：字段1;字段2;字段3;
# - 现场如果 VS 增减字段，优先改各任务的 vision_fields 和 min_value_fields。

[global]
# VS 指令处理预期超时。当前主控是 Client 长连接，这里主要作为人工参考。
vs_timeout_s = 3

# Bot 单条指令等待 OK 的超时时间；通常要比 VS 的等待时间更长。
bot_timeout_s = 8

# Bot 单条指令失败后的重发次数。2 表示最多发送 3 次：首次 + 2 次重试。
bot_retry = 2

# 3D 侧 Task B 测高请求超时。
three_d_timeout_s = 5

[vision]
# Vision Studio 的 TCP 服务地址。
# doCtl 启动 Script 后会主动连接这里，而不是等待 VS 来连主控。
host = "172.29.64.1"
port = 7930

# 连接 VS 的超时，以及断线后多久重连一次。
timeout_s = 3
reconnect_s = 1

[bot]
# Dobot Bot 的 TCP 服务地址。
host = "127.0.0.1"
port = 20001

# 单条 Bot 命令等待 OK 的超时和重试次数。
timeout_s = 8
retry = 2

# true 时只在 Web/日志里显示将要发送的 Bot 命令，不真实连接机械臂。
dry_run = false

[three_d]
# RK 3D 侧 Script TCP 服务地址。
# 3D 侧内部如何调 RealSense、YOLO、桌面标定，由 RK 项目负责；主控只发抽象分号命令。
host = "192.168.173.2"
port = 9303
timeout_s = 5

# Task B 收到 VS 的扳手/螺母 XY 后，主控发给 RK 3D 的请求。
# 3D 侧返回示例：B;7;8; 代表扳手 Z、螺母 Z。
task_b_request = "B;start;"

[tasks.A]
# Task 2：积木抓取/码垛。
name = "Task 2 blocks"

# 用于 dry-run 或现场对照的 VS 样例。
# 约定：A;all;圆X;圆Y;正方体X;正方体Y;长方体X;长方体Y;
sample_vs_message = "A;all;1;2;3;4;5;6;"

# VS 坐标字段最少数量，不包含前面的 A 和 all。
# 如果现场 VS 增加更多物体/字段，这里和 vision_fields 一起改。
min_value_fields = 6

# true：一条 VS 消息里的多个物体依次处理；false：只处理第一个物体。
multi_object = true

# step：MovJ/MovL/Suck(吸)/Suck(停) 分步发送；gp：一条 GP 指令完成抓取放置。
bot_mode = "gp"

# 默认抓取上方安全 Z、抓取 Z、姿态 RPY。
# 放置后释放吸盘，再向上抬升的距离（mm），避免刮到已码放的物体。
release_lift_mm = 15
approach_z = 150
pick_z = 123
pick_rpy = [180, 0, 0]
place_rpy = [180, 0, 0]

# Task A 完成后回到停靠点。格式：X,Y,Z,Rx,Ry,Rz。
dock = [11, 12, 150, 180, 0, 0]

[[tasks.A.vision_fields]]
# 圆柱体字段：从 VS 消息里按顺序取 x,y。
type = "circle"
label = "圆柱体"
fields = ["x", "y"]

[[tasks.A.vision_fields]]
# 正方体字段：从 VS 消息里按顺序取 x,y。
type = "square"
label = "正方体"
fields = ["x", "y"]

[[tasks.A.vision_fields]]
# 长方体字段：从 VS 消息里按顺序取 x,y。
type = "rectangle"
label = "长方体"
fields = ["x", "y"]

[tasks.A.stack]
# 码垛基础 Z。第 N 个物块会在此基础上叠加前序高度。
base_z = 123

# 未单独配置高度的物块，使用这个默认高度。
default_block_height_mm = 20

# 未单独配置放置 XY 的物块，放到这个位置。
default_place_xy = [9, 10]

[tasks.A.objects.circle]
# 圆柱体高度和放置点。
height_mm = 20
place_xy = [9, 10]

[tasks.A.objects.square]
# 正方体高度和放置点。
height_mm = 25
place_xy = [9, 10]

[tasks.A.objects.rectangle]
# 长方体高度和放置点。
height_mm = 15
place_xy = [9, 10]

[tasks.B]
# Task 3：YOLO 贴图物体，VS 给平面 XY，RK 3D 给 Z，Bot 执行 GP。
name = "Task 3 wrench/nut"

# 前置位姿：收到 B 指令后，先移动到此位姿，再向 3D 发送 start 请求。
# 格式：[X, Y, Z, Rx, Ry, Rz]
pre_pose = [-27.047, -227.9198, 236.033, 180, 0, 0]

# VS 样例：B;扳手X;扳手Y;螺母X;螺母Y;
sample_vs_message = "B;1;2;3;4;"

# dry-run 时使用的 3D Z 样例；真实运行时会被 RK 3D 返回值覆盖。
sample_3d_z = [7, 8]

# 桌面基础 Z。真实抓取 Z = base_table_z + RK 3D 返回的物体高度/修正值。
base_table_z = 100

# 抓取和放置姿态 RPY。
pick_rpy = [180, 0, 0]
place_rpy = [180, 0, 0]

# 没有单独配置目的地时使用的默认放置 XY。
default_dest_xy = [20, 30]

# 可选停靠点。某个目标 include_dock=true 时，GP 后面会追加这个停靠点。
dock = [11, 12, 150, 180, 0, 0]

[[tasks.B.vision_fields]]
# 扳手字段：从 VS 消息里按顺序取 x,y。
type = "wrench"
label = "扳手"
fields = ["x", "y"]

[[tasks.B.vision_fields]]
# 螺母字段：从 VS 消息里按顺序取 x,y。
type = "nut"
label = "螺母"
fields = ["x", "y"]

[tasks.B.destinations.wrench]
# 扳手放置 XY；不追加停靠点。
xy = [20, 30]
include_dock = false

[tasks.B.destinations.nut]
# 螺母放置 XY；完成后追加停靠点。
xy = [50, 30]
include_dock = true
